<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoTrack</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#6961ff",
            "background-light": "#f5f5f8",
            "background-dark": "#100f23",
            "nav-bg": "#1A1A22",
            "content-bg": "#0F0F12",
            "card-hover": "#22222E",
            "neutral-dark": "#1A1A22",
            "neutral-deep": "#0F0F12",
            "border-muted": "#2E2E3E",
            "text-muted": "#8888A0"
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .active { background-color: #6961ff !important; color: white !important; }
  </style>
</head>
<body class="bg-background-dark text-slate-100 antialiased overflow-hidden">

  <!-- LOGIN SCREEN (exact same as your Stitch design) -->
  <div id="login-screen" class="flex h-screen w-full">
    <!-- Left Panel -->
    <div class="hidden lg:flex w-1/2 bg-neutral-deep flex-col justify-center items-center p-12 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-full opacity-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
      </div>
      <div class="relative z-10 flex flex-col items-center max-w-md text-center">
        <div class="flex items-center gap-3 mb-4">
          <span class="material-symbols-outlined text-primary text-5xl">movie</span>
          <h1 class="text-4xl font-bold tracking-tight text-white">VideoTrack</h1>
        </div>
        <p class="text-text-muted italic text-lg mb-10">Track your cuts. Get paid.</p>
      </div>
    </div>

    <!-- Right Panel: Login Form -->
    <div class="flex-1 bg-neutral-dark flex flex-col justify-center p-8 lg:p-16">
      <div class="max-w-md w-full mx-auto">
        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-text-muted mb-2">Email Address</label>
            <input id="email" type="email" value="diego@videotrack.com" class="w-full bg-neutral-deep border border-border-muted rounded-lg px-4 py-3 text-white placeholder:text-text-muted/50 focus:ring-2 focus:ring-primary">
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-text-muted mb-2">Password</label>
            <input id="password" type="password" value="123456" class="w-full bg-neutral-deep border border-border-muted rounded-lg px-4 py-3 text-white placeholder:text-text-muted/50 focus:ring-2 focus:ring-primary">
          </div>
          <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-all">Log in</button>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="hidden flex h-screen">
    <!-- Sidebar -->
    <aside class="w-[240px] flex-shrink-0 bg-nav-bg border-r border-white/5 flex flex-col">
      <div class="p-6 flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-4xl">movie</span>
        <h1 class="text-2xl font-bold">VideoTrack</h1>
      </div>
      <nav id="sidebar-nav" class="flex-1 px-4 space-y-1"></nav>
    </aside>

    <!-- Content Area -->
    <div class="flex-1 flex flex-col bg-content-bg overflow-hidden">
      <header id="top-header" class="h-16 bg-nav-bg border-b border-white/5 flex items-center px-8 justify-between"></header>
      <main id="main-content" class="flex-1 overflow-auto p-8"></main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
